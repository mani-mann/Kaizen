<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog Analyzer · Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        #root-home-button{
          position: fixed;
          top: 12px;
          left: 12px;
          z-index: 2147483647;
          width: 40px;
          height: 40px;
          background:#0d6efd;
          color:#fff;
          border-radius:6px;
          box-shadow:0 2px 8px rgba(0,0,0,.35);
          display:flex;
          align-items:center;
          justify-content:center;
          text-decoration:none;
          font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
          font-size:18px;
          user-select:none;
          -webkit-tap-highlight-color:transparent;
        }
        #root-home-button:focus{ outline:2px solid #fff; outline-offset:2px; }
        #root-home-button:hover{ transform:translateY(-1px); transition:transform .12s ease; }
    </style>
</head>

<body>
<!-- Home Button -->
<a id="root-home-button" href="/" aria-label="Home" title="Home">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11.5L12 4l9 7.5"></path>
        <path d="M9 21V12h6v9"></path>
    </svg>
</a>

<div class="container my-5">
    <!-- Header -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">Blog Analyzer</h1>
        <p class="text-muted mb-0">Select a job keyword to analyze the blog</p>
    </div>

    <a href='/bloganalyzer/published' class='btn btn-sm btn-outline-primary'>Published Blogs</a>

    <!-- Job List Table -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
				<!--<th style="width: 180px;">Job ID</th>-->
				<th style="width: 220px;">Download</th>
			    <th>Get HTML</th>
                            <th>Keyword</th>
			    <th>Mark Published</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for job in jobidkeyworddictlist %}
                        <tr>
                            <!--<td class="text-muted small">
                                {{ job['jobid'] }}
			    </td>-->

                            <td>
                                <a
                                    href="/bloganalyzer/zip/{{ job['jobid'] }}"
                                    target="_blank"
                                    class="btn btn-sm btn-outline-primary"
                                >
                                    Download PNG Zip
                                </a>
			    </td>

			    <td>
				    <a href="/bloganalyzer/gethtml/{{ job['jobid'] }}" class="btn btn-sm btn-outline-primary" target="_blank">Get HTML</a>
			    </td>

                            <td>
                                <a
                                    href="{{ url_for('bloganalyzer_blog', jobid=job['jobid']) }}"
                                    class="fw-semibold link-primary text-decoration-none"
                                    target="_blank"
                                >
                                    {{ job['keyword'] }}
                                </a>
                            </td>

			    <td>
				    <a href="/bloganalyzer/markpublished/{{ job['jobid'] }}" class="btn btn-sm btn-outline-primary">Mark Published</a>
			    </td>

                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3" class="text-center text-muted py-4">
                                No blog analysis jobs available
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
