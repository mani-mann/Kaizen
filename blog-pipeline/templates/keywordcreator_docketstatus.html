<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Docket Creators</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Select a Docket Creator</h4>
        </div>
        <div class="card-body">

            {% if docketcreators %}
                <div class="d-grid gap-3">
                    {% for email in docketcreators %}
                        <form method="POST" action="/keywordcreator/docketstatus/docketcreator">
                            <input type="hidden" name="email" value="{{ email }}">
                            <button type="submit" class="btn btn-outline-primary w-100">
                                {{ email }}
                            </button>
                        </form>
                    {% endfor %}
                </div>
            {% else %}
                <p class="text-muted">No docket creators available.</p>
            {% endif %}

        </div>
    </div>
</div>

<!-- Bootstrap JS (optional, only if you need JS components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
